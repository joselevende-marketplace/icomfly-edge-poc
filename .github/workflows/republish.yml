name: Republicar storefronts al edge (Cloudflare)

# Cada ~10 min (y a demanda) re-hornea las tiendas con pagina web ACTIVA leyendo
# la API publica de iComfly (/public/stores-to-bake) y republica al edge de
# Cloudflare Pages (proyecto icomfly-storefronts). Cuando una tienda cambia su
# diseno, sus productos o su subdominio en el panel, su pagina se actualiza SOLA,
# sin que nadie toque nada.

on:
  schedule:
    - cron: '*/10 * * * *'   # GitHub puede demorar el cron unos minutos
  workflow_dispatch:          # boton "Run workflow" manual
  push:
    branches: [ main ]        # republica al cambiar los scripts

permissions:
  contents: read

concurrency:
  group: cloudflare-republish
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Hornear tiendas (lee API publica de iComfly)
        run: node publish.mjs
      - name: Publicar dist/ a Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3'
          command: pages deploy dist --project-name=icomfly-storefronts --branch=main --commit-dirty=true
